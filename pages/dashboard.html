<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Focus | Neural Dashboard</title>
  <style>
    /* CORE NEURAL THEME */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { 
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #0f172a; /* Midnight Navy */
      min-height: 100vh;
      padding: 20px;
      color: #f8fafc;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #1e293b;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      border: 1px solid #334155;
    }

    /* HEADER: CYBER GRID */
    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      padding: 50px 40px;
      text-align: center;
      border-bottom: 1px solid #22d3ee44;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(#22d3ee 0.5px, transparent 0.5px);
      background-size: 20px 20px;
      opacity: 0.1;
      pointer-events: none;
    }

    .header h1 {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #22d3ee, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.3));
    }

    .header p {
      font-size: 1.1rem;
      color: #94a3b8;
      font-weight: 500;
    }

    .main-content {
      padding: 40px;
    }

    /* METRICS: NEURAL NODES */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      margin-bottom: 40px;
    }

    .metric-card {
      background: #334155;
      border-radius: 20px;
      padding: 30px;
      border: 1px solid #475569;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .metric-card:hover {
      transform: translateY(-8px);
      border-color: #22d3ee;
      box-shadow: 0 10px 30px rgba(34, 211, 238, 0.15);
    }

    .metric-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 15px;
    }

    .metric-value {
      font-size: 2.5rem;
      font-weight: 800;
      color: #22d3ee;
      margin-bottom: 8px;
    }

    .metric-subtitle {
      font-size: 0.9rem;
      color: #64748b;
    }

    /* TABLE: FIREWALL LOGS */
    .table-section {
      background: #0f172a;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #334155;
    }

    .table-header {
      background: #1e293b;
      padding: 25px 30px;
      border-bottom: 1px solid #334155;
    }

    .table-header h3 {
      font-size: 1.5rem;
      color: #f8fafc;
    }

    .table-header p {
      color: #64748b;
      font-size: 0.95rem;
    }

    .table-container {
      overflow-x: auto;
      max-height: 500px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      padding: 20px 25px;
      background: #1e293b;
      text-align: left;
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
    }

    td {
      padding: 18px 25px;
      border-bottom: 1px solid #1e293b;
      color: #cbd5e1;
    }

    tr:hover td {
      background-color: #1e293b;
      color: #22d3ee;
    }

    .summary-row {
      background: linear-gradient(90deg, #818cf8 0%, #22d3ee 100%) !important;
      color: #0f172a !important;
      font-weight: 800 !important;
    }

    .time-cell {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      color: #22d3ee;
      font-weight: 600;
    }

    /* CUSTOM SCROLLBAR */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f172a;
    }
    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #22d3ee;
    }

    @media (max-width: 768px) {
      .header h1 { font-size: 2rem; }
      .main-content { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>NEXUS ANALYTICS</h1>
      <p>Neural Telemetry & Digital Wellness Insights</p>
    </div>
    
    <div class="main-content">
      <div id="metrics" class="metrics-grid">
        </div>

      <div class="table-section">
        <div class="table-header">
          <h3>Intercept History</h3>
          <p>Real-time log of neural patterns and scroll-depth analysis.</p>
        </div>
        
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>📅 Timestamp</th>
                <th>🌐 Neural Node (Site)</th>
                <th>⏱️ Focus Duration</th>
              </tr>
            </thead>
            <tbody id="statsBody">
              </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
